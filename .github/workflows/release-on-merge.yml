# Auto-release on merge to main: bump patch version, create tag and release.
# Triggers Helm publish (helm-publish.yml).
# Uses reusable action from github-actions repo. Requires: default branch is main; tags exist as v* (e.g. v0.1.0).

name: Release on merge to main

on:
  push:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'Chart.lock'
      - 'values.yaml'
      - 'README.md'
      - '.helmignore'
      - 'templates/**'

concurrency: release-on-merge

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"
      - name: Lint chart
        run: helm lint .

  release:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Release on merge (create tag and release)
        uses: expectedbehaviors/github-actions/.github/actions/release-on-merge@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
